<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #bfdbfe 40%, #93c5fd 100%);
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(37, 99, 235, 0.15);
      --card-shadow: 0 25px 50px rgba(37, 99, 235, 0.15);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --label-color: #475569;
      --input-bg: #f8fafc;
      --input-border: #cbd5e1;
      --input-text: #1e293b;
      --input-placeholder: #94a3b8;
      --input-focus-border: #3b82f6;
      --input-focus-shadow: rgba(59, 130, 246, 0.25);
      --link-color: #2563eb;
      --link-hover: #1d4ed8;
      --btn-bg: linear-gradient(135deg, #3b82f6, #1d4ed8);
      --btn-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
      --btn-shadow-hover: 0 8px 28px rgba(37, 99, 235, 0.45);
      --social-bg: #f1f5f9;
      --social-border: #e2e8f0;
      --social-text: #475569;
      --social-hover: #e2e8f0;
      --divider-color: #94a3b8;
      --divider-line: #e2e8f0;
      --toggle-bg: rgba(255, 255, 255, 0.7);
      --toggle-border: rgba(37, 99, 235, 0.2);
      --toggle-icon: #1e293b;
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0a1628 0%, #1a3a6b 40%, #2563eb 100%);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --card-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.55);
      --label-color: rgba(255, 255, 255, 0.75);
      --input-bg: rgba(255, 255, 255, 0.07);
      --input-border: rgba(255, 255, 255, 0.15);
      --input-text: #ffffff;
      --input-placeholder: rgba(255, 255, 255, 0.35);
      --input-focus-border: #60a5fa;
      --input-focus-shadow: rgba(96, 165, 250, 0.25);
      --link-color: #93c5fd;
      --link-hover: #bfdbfe;
      --btn-bg: linear-gradient(135deg, #3b82f6, #1d4ed8);
      --btn-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      --btn-shadow-hover: 0 8px 28px rgba(37, 99, 235, 0.55);
      --social-bg: rgba(255, 255, 255, 0.06);
      --social-border: rgba(255, 255, 255, 0.12);
      --social-text: rgba(255, 255, 255, 0.8);
      --social-hover: rgba(255, 255, 255, 0.12);
      --divider-color: rgba(255, 255, 255, 0.4);
      --divider-line: rgba(255, 255, 255, 0.12);
      --toggle-bg: rgba(255, 255, 255, 0.1);
      --toggle-border: rgba(255, 255, 255, 0.2);
      --toggle-icon: #ffffff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      padding: 1.5rem;
      transition: background 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.2s;
      z-index: 10;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }

    .theme-toggle svg {
      width: 22px;
      height: 22px;
      fill: var(--toggle-icon);
      transition: fill 0.2s;
    }

    .icon-sun { display: none; }
    .icon-moon { display: block; }

    [data-theme="dark"] .icon-sun { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: var(--card-shadow);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.45);
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      color: var(--text-primary);
      font-size: 1.75rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.35rem;
      transition: color 0.3s;
    }

    .subtitle {
      color: var(--text-secondary);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: var(--label-color);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.45rem;
      transition: color 0.3s;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--input-text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
    }

    input::placeholder {
      color: var(--input-placeholder);
    }

    input:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px var(--input-focus-shadow);
    }

    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      font-size: 0.85rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .forgot {
      color: var(--link-color);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot:hover {
      color: var(--link-hover);
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: var(--btn-bg);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--btn-shadow);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: var(--btn-shadow-hover);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.75rem 0;
      color: var(--divider-color);
      font-size: 0.8rem;
      transition: color 0.3s;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--divider-line);
      transition: background 0.3s;
    }

    .social-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn-social {
      flex: 1;
      padding: 0.7rem;
      background: var(--social-bg);
      border: 1px solid var(--social-border);
      border-radius: 10px;
      color: var(--social-text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.3s, border-color 0.3s;
    }

    .btn-social:hover {
      background: var(--social-hover);
    }

    .signup {
      text-align: center;
      margin-top: 1.75rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      transition: color 0.3s;
    }

    .signup a {
      color: var(--link-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .signup a:hover {
      color: var(--link-hover);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-16h2v3h-2V2zm0 19h2v3h-2v-3zM2 11h3v2H2v-2zm17 0h3v2h-3v-2zM4.2 4.9l2.1 2.1-1.4 1.4L2.8 6.3l1.4-1.4zm14.5 14.5 2.1 2.1-1.4 1.4-2.1-2.1 1.4-1.4zM19.1 4.2l1.4 1.4-2.1 2.1-1.4-1.4 2.1-2.1zM6.3 17.2l1.4 1.4-2.1 2.1-1.4-1.4 2.1-2.1z"/>
    </svg>
  </button>

  <div class="login-card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C9.24 2 7 4.24 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-2.76-2.24-5-5-5zm0 2a3 3 0 0 1 3 3v3H9V7a3 3 0 0 1 3-3z"/>
      </svg>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social-buttons">
      <button type="button" class="btn-social">Google</button>
      <button type="button" class="btn-social">GitHub</button>
    </div>

    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const form = document.getElementById('loginForm');

    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      localStorage.setItem('userEmail', email);
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
