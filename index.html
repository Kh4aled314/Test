<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 40%, #2563eb 100%);
      padding: 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.45);
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.45rem;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.25);
    }

    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      font-size: 0.85rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .forgot {
      color: #93c5fd;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot:hover {
      color: #bfdbfe;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(37, 99, 235, 0.55);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.75rem 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    .social-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn-social {
      flex: 1;
      padding: 0.7rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .signup {
      text-align: center;
      margin-top: 1.75rem;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.875rem;
    }

    .signup a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 500;
    }

    .signup a:hover {
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C9.24 2 7 4.24 7 7v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-2.76-2.24-5-5-5zm0 2a3 3 0 0 1 3 3v3H9V7a3 3 0 0 1 3-3z"/>
      </svg>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <form>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social-buttons">
      <button type="button" class="btn-social">Google</button>
      <button type="button" class="btn-social">GitHub</button>
    </div>

    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>
</body>
</html>
