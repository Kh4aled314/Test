<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --header-bg: #ffffff;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --toggle-bg: #f1f5f9;
      --toggle-icon: #1e293b;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --header-bg: #1e293b;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --accent: #60a5fa;
      --accent-light: rgba(96, 165, 250, 0.15);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --toggle-bg: #334155;
      --toggle-icon: #f1f5f9;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--toggle-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: var(--toggle-icon);
    }

    .icon-sun { display: none; }
    .icon-moon { display: block; }

    [data-theme="dark"] .icon-sun { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    .btn-logout {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-logout:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .welcome {
      margin-bottom: 2rem;
    }

    .welcome h1 {
      font-size: 1.75rem;
      margin-bottom: 0.35rem;
    }

    .welcome p {
      color: var(--text-muted);
    }

    .theme-badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.35rem 0.75rem;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }

    .card h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .card .value {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <span class="logo-text">Git Practice App</span>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-16h2v3h-2V2zm0 19h2v3h-2v-3zM2 11h3v2H2v-2zm17 0h3v2h-3v-2zM4.2 4.9l2.1 2.1-1.4 1.4L2.8 6.3l1.4-1.4zm14.5 14.5 2.1 2.1-1.4 1.4-2.1-2.1 1.4-1.4zM19.1 4.2l1.4 1.4-2.1 2.1-1.4-1.4 2.1-2.1zM6.3 17.2l1.4 1.4-2.1 2.1-1.4-1.4 2.1-2.1z"/></svg>
      </button>
      <button class="btn-logout" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main>
    <div class="welcome">
      <h1 id="greeting">Welcome!</h1>
      <p>You successfully signed in.</p>
      <span class="theme-badge" id="themeBadge">Light mode</span>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Tasks</h3>
        <div class="value">4</div>
      </div>
      <div class="card">
        <h3>Completed</h3>
        <div class="value">1</div>
      </div>
      <div class="card">
        <h3>Branches</h3>
        <div class="value">3</div>
      </div>
    </div>
  </main>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const badge = document.getElementById('themeBadge');
    const email = localStorage.getItem('userEmail');

    if (email) {
      document.getElementById('greeting').textContent = `Welcome, ${email}!`;
    }

    function updateBadge() {
      const isDark = html.getAttribute('data-theme') === 'dark';
      badge.textContent = isDark ? 'Dark mode active' : 'Light mode active';
    }

    updateBadge();

    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateBadge();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('userEmail');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
